# Dependabot configuration for the OpenSTEF uv workspace.
#
#  - Patch/minor updates are grouped into daily PRs; majors stay individual.
#  - lockfile-only: updates touch uv.lock only, never widen pyproject.toml
#    constraints, so no "update X requirement from A to B" PRs.
#  - Cooldown delays brand-new releases by a few days as supply-chain protection.
#  - Security advisories are in their own group, exempt from cooldown.

version: 2

updates:
  - package-ecosystem: uv
    directories:
      - "/"
      - "/docs"
      - "/examples"
      - "/packages/openstef-beam"
      - "/packages/openstef-core"
      - "/packages/openstef-meta"
      - "/packages/openstef-models"
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 10
    versioning-strategy: lockfile-only
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - python:uv
    cooldown:
      default-days: 3
      semver-patch-days: 2
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      python-security:
        applies-to: security-updates
        update-types: [patch, minor]
      python-versions:
        applies-to: version-updates
        update-types: [patch, minor]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - dependencies
      - github-actions
    cooldown:
      default-days: 3
    groups:
      actions-all:
        patterns: ["*"]
