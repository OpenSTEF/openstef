name: Deploy Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          activate-environment: true
          enable-cache: true
      
      - name: Install dependencies
        run: uv sync --frozen --no-install-project --all-groups --all-extras
      
      - name: Build Sphinx documentation
        run: poe docs
      
      - name: Checkout gh-pages branch for deployment
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: gh-pages
          path: gh-pages-repo
          show-progress: false
      
      - name: Update documentation
        run: |
          # One-shot: archive the existing v3 site into /v3/ if not already done.
          # Detected by absence of /v3/ and presence of index.html at the root.
          if [ ! -d gh-pages-repo/v3 ] && [ -f gh-pages-repo/index.html ]; then
            echo "Archiving existing v3 documentation to gh-pages-repo/v3/"
            mkdir -p gh-pages-repo/v3
            find gh-pages-repo -maxdepth 1 -mindepth 1 \
              ! -name v3 ! -name v4 ! -name .git ! -name .nojekyll \
              -exec mv {} gh-pages-repo/v3/ \;
          fi

          # Clear root (but preserve /v3/, /v4/, .git, .nojekyll) and deploy.
          find gh-pages-repo -maxdepth 1 -mindepth 1 \
            ! -name v3 ! -name v4 ! -name .git ! -name .nojekyll \
            -exec rm -rf {} +
          cp -r docs/build/html/. gh-pages-repo/

      - name: Configure git, stage, and commit changes
        run: |
            cd gh-pages-repo

            # Configure git
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            # Stage changes
            git add -A

            # Check if there are staged changes and commit if so
            if ! git diff --staged --quiet; then
                git commit -m "Deploy documentation from $(echo $GITHUB_SHA | cut -c1-7)"
                echo "✅ Changes committed successfully"
            else
                echo "ℹ️ No changes to commit"
            fi
      
      - name: Push changes to gh-pages
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          directory: gh-pages-repo
